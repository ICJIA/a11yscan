<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="50%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1a1033"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glow2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="80"/>
    </filter>
    <filter id="blur2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="60"/>
    </filter>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient glow blobs -->
  <ellipse cx="200" cy="200" rx="350" ry="250" fill="url(#glow1)" filter="url(#blur1)"/>
  <ellipse cx="950" cy="450" rx="400" ry="280" fill="url(#glow2)" filter="url(#blur2)"/>

  <!-- Subtle dot grid -->
  <g opacity="0.05" fill="#fff">
    <circle cx="40" cy="40" r="1"/><circle cx="80" cy="40" r="1"/><circle cx="120" cy="40" r="1"/><circle cx="160" cy="40" r="1"/><circle cx="200" cy="40" r="1"/><circle cx="240" cy="40" r="1"/><circle cx="280" cy="40" r="1"/><circle cx="320" cy="40" r="1"/><circle cx="360" cy="40" r="1"/><circle cx="400" cy="40" r="1"/><circle cx="440" cy="40" r="1"/><circle cx="480" cy="40" r="1"/><circle cx="520" cy="40" r="1"/><circle cx="560" cy="40" r="1"/><circle cx="600" cy="40" r="1"/><circle cx="640" cy="40" r="1"/><circle cx="680" cy="40" r="1"/><circle cx="720" cy="40" r="1"/><circle cx="760" cy="40" r="1"/><circle cx="800" cy="40" r="1"/><circle cx="840" cy="40" r="1"/><circle cx="880" cy="40" r="1"/><circle cx="920" cy="40" r="1"/><circle cx="960" cy="40" r="1"/><circle cx="1000" cy="40" r="1"/><circle cx="1040" cy="40" r="1"/><circle cx="1080" cy="40" r="1"/><circle cx="1120" cy="40" r="1"/><circle cx="1160" cy="40" r="1"/>
    <circle cx="40" cy="80" r="1"/><circle cx="80" cy="80" r="1"/><circle cx="120" cy="80" r="1"/><circle cx="160" cy="80" r="1"/><circle cx="200" cy="80" r="1"/><circle cx="240" cy="80" r="1"/><circle cx="280" cy="80" r="1"/><circle cx="320" cy="80" r="1"/><circle cx="360" cy="80" r="1"/><circle cx="400" cy="80" r="1"/><circle cx="440" cy="80" r="1"/><circle cx="480" cy="80" r="1"/><circle cx="520" cy="80" r="1"/><circle cx="560" cy="80" r="1"/><circle cx="600" cy="80" r="1"/><circle cx="640" cy="80" r="1"/><circle cx="680" cy="80" r="1"/><circle cx="720" cy="80" r="1"/><circle cx="760" cy="80" r="1"/><circle cx="800" cy="80" r="1"/><circle cx="840" cy="80" r="1"/><circle cx="880" cy="80" r="1"/><circle cx="920" cy="80" r="1"/><circle cx="960" cy="80" r="1"/><circle cx="1000" cy="80" r="1"/><circle cx="1040" cy="80" r="1"/><circle cx="1080" cy="80" r="1"/><circle cx="1120" cy="80" r="1"/><circle cx="1160" cy="80" r="1"/>
    <circle cx="40" cy="120" r="1"/><circle cx="80" cy="120" r="1"/><circle cx="120" cy="120" r="1"/><circle cx="160" cy="120" r="1"/><circle cx="200" cy="120" r="1"/><circle cx="240" cy="120" r="1"/><circle cx="280" cy="120" r="1"/><circle cx="320" cy="120" r="1"/><circle cx="360" cy="120" r="1"/><circle cx="400" cy="120" r="1"/><circle cx="440" cy="120" r="1"/><circle cx="480" cy="120" r="1"/><circle cx="520" cy="120" r="1"/><circle cx="560" cy="120" r="1"/><circle cx="600" cy="120" r="1"/><circle cx="640" cy="120" r="1"/><circle cx="680" cy="120" r="1"/><circle cx="720" cy="120" r="1"/><circle cx="760" cy="120" r="1"/><circle cx="800" cy="120" r="1"/><circle cx="840" cy="120" r="1"/><circle cx="880" cy="120" r="1"/><circle cx="920" cy="120" r="1"/><circle cx="960" cy="120" r="1"/><circle cx="1000" cy="120" r="1"/><circle cx="1040" cy="120" r="1"/><circle cx="1080" cy="120" r="1"/><circle cx="1120" cy="120" r="1"/><circle cx="1160" cy="120" r="1"/>
  </g>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accent)"/>

  <!-- ========== VERTICALLY CENTERED CONTENT (y offset ~55) ========== -->

  <!-- Logo mark -->
  <g transform="translate(80, 55)">
    <text font-family="'SF Mono', 'Fira Code', Consolas, monospace" font-size="18" fill="#6366f1" font-weight="700" opacity="0.5">&lt;/&gt;</text>
  </g>

  <!-- Tool name -->
  <text x="80" y="140" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif" font-size="76" font-weight="800" fill="#f8fafc" letter-spacing="-3">
    a11yscan
  </text>

  <!-- Tagline -->
  <text x="82" y="182" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif" font-size="24" fill="#94a3b8" font-weight="400" letter-spacing="0.5">
    Pattern-aware accessibility auditor
  </text>

  <!-- Accent underline -->
  <rect x="82" y="198" width="100" height="3" rx="1.5" fill="url(#accent)" opacity="0.8"/>

  <!-- Value prop -->
  <text x="82" y="242" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif" font-size="19" fill="#cbd5e1" font-weight="400">
    Groups thousands of violations into actionable patterns.
  </text>
  <text x="82" y="270" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif" font-size="19" fill="#cbd5e1" font-weight="400">
    Fix 12 root causes, not 2,745 line items.
  </text>

  <!-- Terminal card -->
  <g transform="translate(60, 300)" filter="url(#cardShadow)">
    <rect width="520" height="195" rx="12" fill="url(#cardBg)" stroke="#334155" stroke-width="1"/>
    <!-- Title bar -->
    <rect width="520" height="36" rx="12" fill="#1e293b"/>
    <rect y="24" width="520" height="12" fill="#1e293b"/>
    <!-- Window dots -->
    <circle cx="20" cy="18" r="5" fill="#ef4444" opacity="0.9"/>
    <circle cx="38" cy="18" r="5" fill="#eab308" opacity="0.9"/>
    <circle cx="56" cy="18" r="5" fill="#22c55e" opacity="0.9"/>
    <text x="260" y="22" font-family="'SF Mono', Consolas, monospace" font-size="11" fill="#64748b" text-anchor="middle">Terminal</text>
    <!-- Terminal content -->
    <text x="18" y="64" font-family="'SF Mono', 'Fira Code', Consolas, monospace" font-size="14" fill="#64748b">$</text>
    <text x="32" y="64" font-family="'SF Mono', 'Fira Code', Consolas, monospace" font-size="14" fill="#e2e8f0"> a11yscan example.com</text>
    <text x="18" y="94" font-family="'SF Mono', 'Fira Code', Consolas, monospace" font-size="13" fill="#64748b">  Pages scanned:</text>
    <text x="195" y="94" font-family="'SF Mono', 'Fira Code', Consolas, monospace" font-size="13" fill="#22c55e" font-weight="600">1,860</text>
    <text x="18" y="118" font-family="'SF Mono', 'Fira Code', Consolas, monospace" font-size="13" fill="#64748b">  Total violations:</text>
    <text x="215" y="118" font-family="'SF Mono', 'Fira Code', Consolas, monospace" font-size="13" fill="#f59e0b" font-weight="600">4,200</text>
    <text x="18" y="142" font-family="'SF Mono', 'Fira Code', Consolas, monospace" font-size="13" fill="#64748b">  Patterns found:</text>
    <text x="206" y="142" font-family="'SF Mono', 'Fira Code', Consolas, monospace" font-size="13" fill="#a78bfa" font-weight="700">12</text>
    <text x="18" y="172" font-family="'SF Mono', 'Fira Code', Consolas, monospace" font-size="12" fill="#475569">  Reports saved to ./reports/example.com/</text>
  </g>

  <!-- Right side: feature cards -->
  <g transform="translate(660, 300)">
    <!-- Row 1 -->
    <rect x="0" y="0" width="155" height="42" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="78" y="26" font-family="-apple-system, sans-serif" font-size="14" fill="#a78bfa" text-anchor="middle" font-weight="600">axe-core</text>

    <rect x="167" y="0" width="155" height="42" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="244" y="26" font-family="-apple-system, sans-serif" font-size="14" fill="#a78bfa" text-anchor="middle" font-weight="600">Playwright</text>

    <rect x="334" y="0" width="155" height="42" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="412" y="26" font-family="-apple-system, sans-serif" font-size="14" fill="#a78bfa" text-anchor="middle" font-weight="600">TypeScript</text>

    <!-- Row 2 -->
    <rect x="0" y="54" width="205" height="42" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="103" y="80" font-family="-apple-system, sans-serif" font-size="14" fill="#34d399" text-anchor="middle" font-weight="600">CSV + JSON + HTML</text>

    <rect x="217" y="54" width="155" height="42" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="294" y="80" font-family="-apple-system, sans-serif" font-size="14" fill="#34d399" text-anchor="middle" font-weight="600">LLM-ready</text>

    <rect x="384" y="54" width="105" height="42" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="437" y="80" font-family="-apple-system, sans-serif" font-size="14" fill="#34d399" text-anchor="middle" font-weight="600">pnpm</text>

    <!-- Row 3 -->
    <rect x="0" y="108" width="140" height="42" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="70" y="134" font-family="-apple-system, sans-serif" font-size="14" fill="#fbbf24" text-anchor="middle" font-weight="600">CI/CD mode</text>

    <rect x="152" y="108" width="155" height="42" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="230" y="134" font-family="-apple-system, sans-serif" font-size="14" fill="#fbbf24" text-anchor="middle" font-weight="600">WCAG 2.1 AA</text>

    <rect x="319" y="108" width="170" height="42" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="404" y="134" font-family="-apple-system, sans-serif" font-size="14" fill="#fbbf24" text-anchor="middle" font-weight="600">ADA Title II</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="598" width="1200" height="32" fill="#020617" opacity="0.7"/>
  <text x="80" y="619" font-family="'SF Mono', Consolas, monospace" font-size="13" fill="#475569">
    github.com/ICJIA/a11yscan
  </text>
  <text x="600" y="619" font-family="-apple-system, sans-serif" font-size="13" fill="#475569" text-anchor="middle">
    Node.js 20+ | pnpm | MIT License
  </text>
  <text x="1120" y="619" font-family="-apple-system, sans-serif" font-size="13" fill="#475569" text-anchor="end">
    a11yscan.dev
  </text>
</svg>
